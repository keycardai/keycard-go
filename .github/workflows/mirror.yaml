name: Mirror Repository

on:
  push:
    branches: ['**']
    tags: ['**']

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate installation token for target org
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_REPO_ACCESS_APP_ID }}
          private-key: ${{ secrets.GH_REPO_ACCESS_PRIVATE_KEY }}
          owner: keycardai
          repositories: |
            keycard-go

      - name: Debug token access
        env:
          TOKEN: ${{ steps.token.outputs.token }}
        run: |
          # Check what repos the token can access
          curl -s -H "Authorization: Bearer ${TOKEN}" \
            https://api.github.com/installation/repositories | jq '.repositories[].full_name'

          # Check the specific repo
          curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${TOKEN}" \
            https://api.github.com/repos/keycardai/keycard-go

      - name: Push to mirror
        run: |
          git remote add mirror \
            "https://x-access-token:${{ steps.token.outputs.token }}@github.com/keycardai/keycard-go.git"
          git push mirror --all --force
          git push mirror --tags --force
          git push mirror --prune
